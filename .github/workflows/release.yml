name: Release

on:
  release:
    types: [published, released]

jobs:
  build:
    name: Build and attach artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
      - run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Run PyPI release only when it's not a prerelease
  publish:
    name: Publish to PyPI
    needs: build
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

      - name: Trigger Homebrew formula update
        run: |
          gh api repos/triluch/homebrew-lyrsmith/dispatches \
            -f event_type=new-release \
            -f "client_payload[version]=${{ github.event.release.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
