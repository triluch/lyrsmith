name: Release

# Fires when a GitHub release is published.  Pre-releases are skipped so
# only stable releases land on PyPI and get build artifacts attached.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, attach artifacts, and publish to PyPI
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    environment: release
    permissions:
      id-token: write   # OIDC trusted publishing — no API token required
      contents: write   # upload dist files as release assets

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - name: Attach dist files to the release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
