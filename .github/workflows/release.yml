name: Release

on:
  release:
    types: [published]

jobs:
  # Runs on every published release including pre-releases.
  # Builds the wheel + sdist and attaches them to the release.
  # --clobber means re-runs replace existing assets rather than failing.
  build:
    name: Build and attach artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Only runs for stable (non-pre-release) releases.
  # Downloads the already-built dist from the build job and publishes to PyPI
  # via OIDC trusted publishing — no API token required.
  publish:
    name: Publish to PyPI
    needs: build
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
