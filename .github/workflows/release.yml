name: Release

on:
  release:
    types: [published, released]

jobs:
  build:
    name: Build and attach artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set package version from release tag
        shell: python
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          import os
          import pathlib
          import re
          import sys

          raw_tag = os.environ["RELEASE_TAG"].strip()
          version = raw_tag[1:] if raw_tag.startswith("v") else raw_tag

          if not re.fullmatch(r"\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?", version):
              print(
                  f"Unsupported release tag format: {raw_tag}. "
                  "Use PEP 440 tags like v1.2.3 or v1.2.3b1",
                  file=sys.stderr,
              )
              sys.exit(1)

          pyproject = pathlib.Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              print("Could not update project version in pyproject.toml", file=sys.stderr)
              sys.exit(1)

          pyproject.write_text(updated, encoding="utf-8")
          print(f"Using package version: {version}")
      - name: Check if AppImage already exists on release
        id: check_appimage
        run: |
          count="$(gh api repos/${{ github.repository }}/releases/${{ github.event.release.id }} --jq '[.assets[].name | select(test("^lyrsmith-.*-x86_64\\.AppImage$"))] | length')"
          if [ "$count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "AppImage asset already present; skipping AppImage build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - name: Install AppImage build dependencies
        if: steps.check_appimage.outputs.exists != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils \
            desktop-file-utils \
            fakeroot \
            file \
            gtk-update-icon-cache \
            libgdk-pixbuf2.0-bin \
            libgdk-pixbuf2.0-dev \
            patchelf \
            python3-venv \
            squashfs-tools \
            zsync
      - name: Install appimage-builder
        if: steps.check_appimage.outputs.exists != 'true'
        run: |
          python3 -m venv /tmp/aib
          /tmp/aib/bin/pip install --no-cache-dir "appimage-builder==1.1.0" "packaging<22"
          echo "/tmp/aib/bin" >> "$GITHUB_PATH"
      - name: Build AppImage
        if: steps.check_appimage.outputs.exists != 'true'
        run: ./scripts/build_appimage.sh
      - name: Smoke test generated AppImage in runner
        if: steps.check_appimage.outputs.exists != 'true'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          appimage="$(ls dist/*.AppImage)"
          echo "Testing $appimage"
          "$appimage" --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
      - run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # Run PyPI release only when it's not a prerelease
  publish:
    name: Publish to PyPI
    needs: build
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

      - name: Trigger Homebrew formula update
        run: |
          gh api repos/triluch/homebrew-lyrsmith/dispatches \
            -f event_type=new-release \
            -f "client_payload[version]=${{ github.event.release.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
