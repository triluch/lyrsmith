name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    name: Tests (fast)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libmpv2
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -m "not slow" -q

  test-macos:
    name: Tests (fast, macOS)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: brew install mpv
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -m "not slow" -q

  test-full:
    name: Tests (full, incl. slow)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libmpv2
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-tiny
      - run: uv sync
      - run: uv run pytest -q

  test-full-macos:
    name: Tests (full, incl. slow, macOS)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: brew install mpv
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-tiny-macos
      - run: uv sync
      - run: uv run pytest -q
