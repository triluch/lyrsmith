name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    name: Tests (fast)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libmpv2
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run pytest -m "not slow"

  test-macos:
    name: Tests (fast, macOS)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-mpv-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: brew-${{ runner.os }}-mpv-
      - name: Install system dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: brew install mpv
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - name: Fix duplicate libavdevice (PyAV bundled vs system ffmpeg from mpv)
        run: |
          bundled=$(find .venv -path '*/av/.dylibs/libavdevice.*.dylib' | head -1)
          system=$(find /opt/homebrew -name 'libavdevice.*.dylib' | head -1)
          [ -n "$bundled" ] && [ -n "$system" ] && ln -sf "$system" "$bundled" || true
      - run: uv run pytest -m "not slow"

  test-full:
    name: Tests (full, incl. slow)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libmpv2
      - uses: astral-sh/setup-uv@v7
      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-tiny
      - run: uv sync
      - run: uv run pytest

  test-full-macos:
    name: Tests (full, incl. slow, macOS)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-mpv-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: brew-${{ runner.os }}-mpv-
      - name: Install system dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: brew install mpv
      - uses: astral-sh/setup-uv@v7
      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-tiny-macos
      - run: uv sync
      - name: Fix duplicate libavdevice (PyAV bundled vs system ffmpeg from mpv)
        run: |
          bundled=$(find .venv -path '*/av/.dylibs/libavdevice.*.dylib' | head -1)
          system=$(find /opt/homebrew -name 'libavdevice.*.dylib' | head -1)
          [ -n "$bundled" ] && [ -n "$system" ] && ln -sf "$system" "$bundled" || true
      - run: uv run pytest
